<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Savory House | Reservation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="reservation">
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-banner">
      <div class="container text-center reveal-item">
        <h1 class="display-6 fw-bold">Book a Table</h1>
        <p class="text-muted mb-0">Reserve your preferred date and time in a few clicks.</p>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 reveal-item">
            <div class="content-card p-4 p-md-5 bg-white">
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Time</label>
                    <input type="time" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Guests</label>
                    <select class="form-select" required>
                      <option value="">Select guests</option>
                      <option>1-2</option>
                      <option>3-4</option>
                      <option>5-6</option>
                      <option>7+</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Occasion (Optional)</label>
                    <input type="text" class="form-control" placeholder="Birthday, Anniversary..." />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Special Request</label>
                    <textarea class="form-control" rows="4" placeholder="Allergies, seating preference, etc."></textarea>
                  </div>
                  <div class="col-12 d-grid d-md-flex justify-content-md-end">
                    <button type="submit" class="btn btn-brand rounded-pill px-4 py-2">Confirm Reservation</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
