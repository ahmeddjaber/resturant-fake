<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Savory House | Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="contact">
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-banner">
      <div class="container text-center reveal-item">
        <h1 class="display-6 fw-bold">Contact Us</h1>
        <p class="text-muted mb-0">We are here to help with reservations, events, and inquiries.</p>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-5 reveal-item">
            <div class="content-card p-4 h-100 bg-white">
              <h4 class="mb-3">Visit & Reach Us</h4>
              <p class="mb-2"><strong>Address:</strong> 24 Gourmet Avenue, Paris</p>
              <p class="mb-2"><strong>Phone:</strong> +33 1 23 45 67 89</p>
              <p class="mb-0"><strong>Email:</strong> hello@savoryhouse.com</p>
            </div>
          </div>

          <div class="col-lg-7 reveal-item">
            <div class="content-card p-4 bg-white">
              <h4 class="mb-3">Send a Message</h4>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <input type="text" class="form-control" placeholder="Your Name" required />
                  </div>
                  <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Your Email" required />
                  </div>
                  <div class="col-12">
                    <input type="text" class="form-control" placeholder="Subject" />
                  </div>
                  <div class="col-12">
                    <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-brand rounded-pill px-4">Send Message</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
